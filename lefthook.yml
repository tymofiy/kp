# Git Hooks (via Lefthook)
# Install: lefthook install

rc: .lefthookrc

pre-commit:
  parallel: true
  commands:
    secrets:
      run: |
        for file in {staged_files}; do
          if grep -Ei 'password\s*[:=]\s*["'"'"'][^"'"'"']+["'"'"']|api[_-]?key\s*[:=]\s*["'"'"'][^"'"'"']+["'"'"']|secret\s*[:=]\s*["'"'"'][^"'"'"']+["'"'"']|BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY|ghp_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{48}' "$file" 2>/dev/null; then
            echo "Potential secret in: $file"
            exit 1
          fi
        done

    markdownlint:
      glob: "*.md"
      run: markdownlint {staged_files}

    yaml-validate:
      glob: "*.{yml,yaml}"
      run: |
        for file in {staged_files}; do
          ruby -e "require 'yaml'; YAML.load_file('$file')" 2>/dev/null || {
            echo "Invalid YAML: $file"
            exit 1
          }
        done

    large-files:
      run: |
        for file in {staged_files}; do
          if [ -f "$file" ]; then
            size=$(wc -c < "$file" 2>/dev/null || echo 0)
            if [ "$size" -gt 1048576 ]; then
              echo "Large file (>1MB): $file ($(( size / 1048576 ))MB)"
              exit 1
            fi
          fi
        done

    # Public repo: scan staged content for AI-consultation process language.
    # This is a backstop — the primary defense is agent awareness in the
    # containing workspace. Workspace-specific codename and path patterns
    # live in that workspace's hooks; this file only carries generic
    # process-language patterns that are safe to expose publicly.
    deny-list:
      glob: "*.{md,txt,yml,yaml,json,cff,toml}"
      exclude: "lefthook.yml"
      run: |
        found=0
        for file in {staged_files}; do
          if [ ! -f "$file" ]; then continue; fi

          if grep -inE 'cross-model (review|consultation|spec review)|multi-model (synthesis|analysis|consultation|spec review)|three-model consultation|two-model consultation|round [0-9]+ (review|verify|cross-model|findings)|consulted (codex|gemini|claude)|adversarial review|(codex|gemini|claude) feedback|reviewer [0-9]+\b|session handover|model attributions' "$file" 2>/dev/null; then
            echo "Process-language match in: $file"
            found=1
          fi
        done
        if [ "$found" -eq 1 ]; then
          echo ""
          echo "Process-language match detected. This is a PUBLIC repo."
          echo "Describe what changed, not which models reviewed it."
          exit 1
        fi

commit-msg:
  commands:
    validate:
      run: scripts/validate-commit-msg {1}

    # Public repo: scan commit message for AI-consultation process language.
    # Workspace-specific codename and path patterns live in the containing
    # workspace's hooks; this file only carries generic patterns that are
    # safe to expose publicly.
    deny-list:
      run: |
        msg=$(cat "{1}")

        # Strip allowed Co-Authored-By trailers before scanning
        clean=$(echo "$msg" | sed -E '/^Co-Authored-By: (Claude|Codex|Gemini|Antigravity|Cursor) <noreply@[^>]+>$/d')

        if echo "$clean" | grep -iE 'cross-model|multi-model (synthesis|analysis|consultation|review)|round [0-9]+ (review|verify|findings)|consulted (codex|gemini|claude)|(codex|gemini|claude) (feedback|suggested|reviewed)|adversarial review|reviewer [0-9]+\b|session handover|model attributions' >/dev/null 2>&1; then
          echo ""
          echo "Process language in commit message. This is a PUBLIC repo."
          echo "Describe what changed, not which models reviewed it."
          exit 1
        fi
